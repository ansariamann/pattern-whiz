<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pattern Whiz — Predict the Next</title>
  <meta name="description" content="Spot the pattern and predict the next item. Numbers, letters, shapes — a new puzzle every round. GATE-grade sequences." />
  <meta name="author" content="Pattern Whiz" />
  <meta property="og:title" content="Pattern Whiz — Predict the Next" />
  <meta property="og:description" content="Spot the pattern and predict the next item. GATE-grade sequences. Solve, earn XP, level up." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>
  <!-- Animated background -->
  <div class="bg-layer" aria-hidden="true">
    <div class="bg-gradient"></div>
    <div class="bg-orb bg-orb--top"></div>
    <div class="bg-orb bg-orb--bottom"></div>
    <div class="bg-grid"></div>
  </div>

  <div class="container">
    <!-- Header -->
    <header class="header" id="header">
      <div class="header__left">
        <div class="badge badge--accent">
          <svg class="icon icon--xs" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3l1.5 3.7 3.9.6-2.8 2.7.7 3.9L12 12.2 8.7 14l.7-3.9L6.6 7.3l3.9-.6z"/></svg>
          Aptitude trainer
        </div>
        <h1 class="title">Pattern Whiz</h1>
        <p class="subtitle">GATE-grade sequences. Solve → earn XP → level up.</p>
      </div>

      <!-- Scoreboard -->
      <div class="scoreboard" id="scoreboard">
        <div class="scoreboard__row">
          <div class="xp-coin" id="xp-coin">
            <div class="xp-coin__disc" id="xp-disc">
              <span class="xp-coin__label">XP</span>
              <span class="xp-coin__popup" id="xp-popup"></span>
            </div>
            <div class="xp-coin__text">
              <span class="stat-label">Experience</span>
              <span class="stat-value stat-value--amber" id="xp-value">0</span>
            </div>
          </div>
          <div class="scoreboard__sep"></div>
          <div class="stat">
            <span class="stat-label">Level</span>
            <span class="stat-value stat-value--violet" id="level-value">1</span>
          </div>
          <div class="scoreboard__sep"></div>
          <div class="stat">
            <span class="stat-label">Streak</span>
            <span class="stat-value" id="streak-value">0</span>
          </div>
          <div class="scoreboard__sep"></div>
          <div class="stat">
            <span class="stat-label">Lives</span>
            <div class="lives" id="lives-display">
              <svg class="heart heart--full" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
              <svg class="heart heart--full" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
              <svg class="heart heart--full" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
            </div>
          </div>
        </div>
        <div class="progress-bar">
          <div class="progress-bar__fill" id="progress-fill"></div>
        </div>
      </div>
    </header>

    <!-- Difficulty filter -->
    <div class="filter-bar" id="filter-bar">
      <span class="filter-label">
        <svg class="icon icon--xs" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg>
        Difficulty
      </span>
      <button class="filter-chip filter-chip--active" data-filter="All" id="filter-all">All</button>
      <button class="filter-chip" data-filter="Easy" id="filter-easy">Easy</button>
      <button class="filter-chip" data-filter="Medium" id="filter-medium">Medium</button>
      <button class="filter-chip" data-filter="Hard" id="filter-hard">Hard</button>
      <button class="filter-chip" data-filter="GATE" id="filter-gate">GATE</button>
    </div>

    <!-- Main card -->
    <div class="card" id="game-card">
      <div class="card__accent-bar" id="accent-bar"></div>
      <div class="card__header">
        <span class="diff-chip" id="diff-chip"></span>
        <div class="card__stats">
          <span id="solved-label">Solved 0</span>
          <span class="dot">·</span>
          <span class="streak-inline">
            <svg class="icon icon--xs flame-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 12c2-2.96 0-7-1-8 0 3.04-4 6.5-4 8s2.04 4 5 4 5-2 5-4c0-1.5-1.5-3-3-4 0 1-1 2-2 4z"/></svg>
            <span id="streak-inline-val">0</span>
          </span>
        </div>
      </div>

      <!-- Series display -->
      <div class="series" id="series-display"></div>

      <!-- Input form -->
      <form class="input-row" id="answer-form">
        <input type="text" class="input" id="answer-input" placeholder="Your answer…" autocomplete="off" autofocus />
        <button type="submit" class="btn btn--primary" id="submit-btn">Submit</button>
      </form>

      <!-- Actions -->
      <div class="actions">
        <button type="button" class="btn btn--ghost" id="hint-btn">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18h6M10 22h4M12 2a7 7 0 0 1 4 12.9V17H8v-2.1A7 7 0 0 1 12 2z"/></svg>
          Hint (resets streak)
        </button>
        <button type="button" class="btn btn--ghost" id="skip-btn">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
          Skip
        </button>
      </div>
    </div>

    <p class="footer-text" id="footer-text">Best streak: 0 · Mix of arithmetic, algebraic, recurrence, prime &amp; alphanumeric series.</p>
  </div>

  <!-- Game Over Modal -->
  <div class="modal-overlay" id="modal-overlay" style="display:none;">
    <div class="modal" id="game-over-modal">
      <div class="modal__header">
        <svg class="icon icon--lg trophy-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18M4 22h16M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 19.24 7 22M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 19.24 17 22M18 2H6v7a6 6 0 0 0 12 0V2z"/></svg>
        <h2 class="modal__title">Game Over</h2>
      </div>
      <p class="modal__desc" id="modal-desc"></p>
      <button class="btn btn--primary btn--full" id="play-again-btn">Play Again</button>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toast-container"></div>

  <script src="{{ url_for('static', filename='js/patterns.js') }}"></script>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
